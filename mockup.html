<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAMILAS V2 Mockup</title>
  <link rel="stylesheet" href="./src/styles/design_v2.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Mockup-specific reset since we don't have global styles applied */
    body {
      margin: 0;
      background-color: #08080A; /* match ink */
    }
  </style>
</head>
<body>
  <main class="recipe-step-v2 mamilas-design-v2">
    <div class="recipe-header">
      <h1 class="recipe-header-title">MAMILAS / RECIPE DESK</h1>
      <div class="recipe-actions" style="margin-top: 0; padding-top: 0; border-top: none;">
        <button data-testid="download-recipe">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Reçeteyi İndir
        </button>
      </div>
    </div>

    <div class="recipe-world-tabs">
      <button class="recipe-tab-button active">Animation / Edu</button>
      <button class="recipe-tab-button">Stylized</button>
      <button class="recipe-tab-button">Cinematic Real</button>
    </div>

    <div class="recipe-world-grid">
      <button class="recipe-world-button active">
        <h3 style="margin: 0 0 4px 0; font-family: 'Inter Tight', sans-serif; font-size: 16px;">Pixar 3D — Education Tier</h3>
        <p style="margin: 0; font-size: 13px; color: var(--m2-muted);">Yumuşak beveled 3D formlar, sıcak bounce ışık...</p>
      </button>

      <button class="recipe-world-button">
        <h3 style="margin: 0 0 4px 0; font-family: 'Inter Tight', sans-serif; font-size: 16px;">Paper Craft Pop-Up</h3>
        <p style="margin: 0; font-size: 13px; color: var(--m2-muted);">Elle kesilmiş, katlanmış kağıt katmanları...</p>
      </button>

      <button class="recipe-world-button">
        <h3 style="margin: 0 0 4px 0; font-family: 'Inter Tight', sans-serif; font-size: 16px;">Studio Ghibli — Hayao</h3>
        <p style="margin: 0; font-size: 13px; color: var(--m2-muted);">Watercolor arka plan, elle çizilmiş karakter key...</p>
      </button>

      <button class="recipe-world-button">
        <h3 style="margin: 0 0 4px 0; font-family: 'Inter Tight', sans-serif; font-size: 16px;">Arcane — Fortiche</h3>
        <p style="margin: 0; font-size: 13px; color: var(--m2-muted);">Yağlıboya dokusuyla giydirilmiş 3D form...</p>
      </button>

      <button class="recipe-world-button">
        <h3 style="margin: 0 0 4px 0; font-family: 'Inter Tight', sans-serif; font-size: 16px;">Roger Deakins — Naturalist</h3>
        <p style="margin: 0; font-size: 13px; color: var(--m2-muted);">Motivated single-source natural key, minimal fill...</p>
      </button>

      <button class="recipe-world-button">
        <h3 style="margin: 0 0 4px 0; font-family: 'Inter Tight', sans-serif; font-size: 16px;">David Fincher — Precision</h3>
        <p style="margin: 0; font-size: 13px; color: var(--m2-muted);">Locked-off geometric composition, dijital keskinlik...</p>
      </button>
    </div>

    <div class="recipe-meta-grid">
      <div>
        <h2 style="font-family: var(--m2-font-display); font-size: 20px; font-weight: 600; margin-bottom: 24px;">Substance & Palette</h2>

        <div style="margin-bottom: 24px;">
          <label style="display: block; font-size: 13px; color: var(--m2-muted); margin-bottom: 8px;">Materyal</label>
          <div class="recipe-material-grid">
            <button class="recipe-material-button">None</button>
            <button class="recipe-material-button active">Paper Craft</button>
            <button class="recipe-material-button">Clay</button>
            <button class="recipe-material-button">Notebook Ink</button>
          </div>
        </div>

        <div>
          <label style="display: block; font-size: 13px; color: var(--m2-muted); margin-bottom: 8px;">Palette Override</label>
          <div class="recipe-palette-grid">
            <button class="recipe-palette-button active">
              <span style="background-color: #3D2817"></span>
              <span style="background-color: #F4C7A6"></span>
              <span style="background-color: #F28C4A"></span>
              <span style="background-color: #FFF6DC"></span>
            </button>
            <button class="recipe-palette-button">
              <span style="background-color: #0B111A"></span>
              <span style="background-color: #3A4A5A"></span>
              <span style="background-color: #4DD0E1"></span>
              <span style="background-color: #F5E6C8"></span>
            </button>
            <button class="recipe-palette-button">
              <span style="background-color: #1A0F3D"></span>
              <span style="background-color: #E63946"></span>
              <span style="background-color: #00E5FF"></span>
              <span style="background-color: #FFFF3D"></span>
            </button>
          </div>
        </div>
      </div>

      <div>
        <h2 style="font-family: var(--m2-font-display); font-size: 20px; font-weight: 600; margin-bottom: 24px;">Context</h2>
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 13px; color: var(--m2-muted); margin-bottom: 4px;">Cast</label>
          <input type="text" class="meta-input" placeholder="e.g., @defne, @aras" value="@defne, @aras">
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 13px; color: var(--m2-muted); margin-bottom: 4px;">Lokasyon</label>
          <input type="text" class="meta-input" placeholder="e.g., Sınıf" value="Sınıf">
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display: block; font-size: 13px; color: var(--m2-muted); margin-bottom: 4px;">Konu</label>
          <input type="text" class="meta-input" placeholder="e.g., 1. Sınıf Matematik" value="1. Sınıf Matematik — Uzamsal İlişkiler">
        </div>
      </div>
    </div>

    <h2 style="font-family: var(--m2-font-display); font-size: 20px; font-weight: 600; margin-bottom: 24px;">Scene List</h2>
    <div class="recipe-scenes-list">
      <div class="recipe-scene-note">
        <label>SCENE 1 // VO & EVENT</label>
        <textarea rows="2" placeholder="Voice Over & Action...">Defne kırmızı iplikli sağ bileğini kaldırır, sağa dönüş başlar.</textarea>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 12px;">
          <div style="display: flex; flex-direction: column;">
            <label>DIRECTOR NOTE</label>
            <input type="text" placeholder="Camera, lighting..." value="Low push-in, sağ omuz foreground parallax">
          </div>
          <div style="display: flex; flex-direction: column;">
            <label>MOTION SEED</label>
            <input type="text" placeholder="Keyframes..." value="Sağ bilek kaldırma yarısı">
          </div>
          <div style="display: flex; flex-direction: column;">
            <label>TURKISH LABEL</label>
            <input type="text" placeholder="On-screen text..." value="SAĞ">
          </div>
        </div>
      </div>

      <div class="recipe-scene-note">
        <label>SCENE 2 // VO & EVENT</label>
        <textarea rows="2" placeholder="Voice Over & Action..."></textarea>

        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 12px;">
          <div style="display: flex; flex-direction: column;">
            <label>DIRECTOR NOTE</label>
            <input type="text" placeholder="Camera, lighting...">
          </div>
          <div style="display: flex; flex-direction: column;">
            <label>MOTION SEED</label>
            <input type="text" placeholder="Keyframes...">
          </div>
          <div style="display: flex; flex-direction: column;">
            <label>TURKISH LABEL</label>
            <input type="text" placeholder="On-screen text...">
          </div>
        </div>
      </div>
    </div>

  </main>
</body>
</html>
